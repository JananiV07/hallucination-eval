name: integration

# Real-model integration tests (download the NLI + spaCy models and verify the
# scores rank correct answers above hallucinated ones). Kept off the per-push
# `tests` workflow because it downloads weights; runs weekly and on demand.
on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (CPU torch + spaCy model)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
          python -m spacy download en_core_web_sm
      - name: Run real-model integration tests
        run: pytest -m integration -v
